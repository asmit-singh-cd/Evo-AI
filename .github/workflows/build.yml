name: Build EVO EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install cmake
        pip install dlib
        pip install pipwin
        pipwin install pyaudio
        pip install -r requirements.txt

    - name: Build EXE
      run: |
        pyinstaller --onefile --hidden-import=cv2 --hidden-import=face_recognition evo.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: EVO-EXE
        path: dist/
